<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroGuard AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1a38, #2c003e);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .container {
      text-align: center;
    }

    .upload-box {
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      color: black;
    }

    input[type="file"] {
      margin: 15px 0;
    }

    .card {
      background: #fff;
      width: 340px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      margin-top: 20px;
      display: none; /* hidden until upload */
    }

    .card-header {
      background: #1c8c43;
      color: white;
      padding: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .section {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .disease { color: red; }
    .fertilizer { color: green; }
    .weather { color: dodgerblue; }

    .kannada {
      padding: 12px 16px;
      font-size: 14px;
      background: #f6f6f6;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Upload Box -->
    <div class="upload-box">
      <h2>🌱 AgroGuard AI</h2>
      <p>Upload a crop image to detect disease:</p>
      <input type="file" id="imageUpload" accept="image/*">
      <br>
      <button onclick="processImage()">Analyze</button>
    </div>

    <!-- Result Card -->
    <div class="card" id="resultCard">
      <div class="card-header">AgroGuard AI</div>
      <img id="uploadedImg" src="" alt="Leaf">

      <div class="section disease">
        ⚠ <p><b>Disease Detected:</b> Leaf Blight (94% Confidence)</p>
      </div>

      <div class="section fertilizer">
        🌱 <p><b>Recommended Fertilizer:</b> Potassium Nitrate (KNO₃)</p>
      </div>

      <div class="section weather">
        🌧 <p><b>Weather Alert:</b> Rain expected in 2 days. Suggest delaying spray.</p>
      </div>

      <div class="kannada">
        🎙 2 ದಿನಗಳಲ್ಲಿ ಮಳೆಯ ಸಾಧ್ಯತೆ ಇದೆ.<br>
        ಸ್ಪ್ರೇ ಮಾಡುವುದು ತಡಮಾಡಿ.
      </div>
    </div>
  </div>

  <script>
    function processImage() {
      const fileInput = document.getElementById("imageUpload");
      const card = document.getElementById("resultCard");
      const uploadedImg = document.getElementById("uploadedImg");

      if (fileInput.files.length > 0) {
        const reader = new FileReader();
        reader.onload = function(e) {
          uploadedImg.src = e.target.result; // Show uploaded image
        }
        reader.readAsDataURL(fileInput.files[0]);

        // Show result card
        card.style.display = "block";
      } else {
        alert("Please upload an image first!");
      }
    }
  </script>
</body>
</html>
